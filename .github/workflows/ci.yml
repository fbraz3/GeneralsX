name: GeneralsX CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_linux_arm64:
        description: "Run additional Linux ARM64 build"
        type: boolean
        required: false
        default: false
      run_macos_x86_64:
        description: "Run additional macOS x86_64 build"
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      zh-should-build: ${{ steps.filter.outputs.zh-should-build }}
      base-should-build: ${{ steps.filter.outputs.base-should-build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter Changed Paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          token: ''
          filters: |
            zh-should-build:
              - 'GeneralsMD/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'
            base-should-build:
              - 'Generals/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'

      - name: Build Trigger Summary
        run: |
          echo "### 🔍 CI Trigger (Granular)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.filter.outputs.zh-should-build }}" = "true" ]; then
            echo "| GeneralsX ZH (GeneralsMD) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX ZH (GeneralsMD) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.filter.outputs.base-should-build }}" = "true" ]; then
            echo "| GeneralsX Base (Generals) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX Base (Generals) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi

  build-linux:
    name: Build Linux (GeneralsMD)
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux.yml
    with:
      game: GeneralsMD
      preset: linux64-deploy
    secrets: inherit

  build-linux-generals:
    name: Build Linux (Generals)
    needs: detect-changes
    if: needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux.yml
    with:
      game: Generals
      preset: linux64-deploy
    secrets: inherit

  build-macos:
    name: Build macOS (GeneralsMD)
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-macos.yml
    with:
      game: GeneralsMD
      preset: macos-vulkan
    secrets: inherit

  build-macos-generals:
    name: Build macOS (Generals)
    needs: detect-changes
    if: needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-macos.yml
    with:
      game: Generals
      preset: macos-vulkan
    secrets: inherit

  build-windows:
    name: Build Windows Modern (GeneralsMD)
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-windows.yml
    with:
      game: GeneralsMD
      preset: win64-modern
    secrets: inherit

  build-linux-arm64-manual:
    name: Build Linux ARM64 (GeneralsMD, Manual)
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' && inputs.run_linux_arm64
    uses: ./.github/workflows/build-linux.yml
    with:
      game: GeneralsMD
      preset: linux64-deploy
      runs_on: ubuntu-24.04-arm
    secrets: inherit

  build-macos-x86-manual:
    name: Build macOS x86_64 (GeneralsMD, Manual)
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' && inputs.run_macos_x86_64
    uses: ./.github/workflows/build-macos.yml
    with:
      game: GeneralsMD
      preset: macos-vulkan
      runs_on: macos-13
      vcpkg_triplet: x64-osx
      bundle_enabled: "false"
    secrets: inherit

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-generals, build-macos, build-macos-generals, build-windows, build-linux-arm64-manual, build-macos-x86-manual]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "### ✅ GeneralsX Multi-Platform Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux (x86_64) | ${{ needs.build-linux.result == 'success' && '✅ Success' || needs.build-linux.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Generals Base (x86_64) | ${{ needs.build-linux-generals.result == 'success' && '✅ Success' || needs.build-linux-generals.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (arm64) | ${{ needs.build-macos.result == 'success' && '✅ Success' || needs.build-macos.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Generals Base (arm64) | ${{ needs.build-macos-generals.result == 'success' && '✅ Success' || needs.build-macos-generals.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows (x64/modern) | ${{ needs.build-windows.result == 'success' && '✅ Success' || needs.build-windows.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux (arm64, manual) | ${{ needs.build-linux-arm64-manual.result == 'success' && '✅ Success' || needs.build-linux-arm64-manual.result == 'skipped' && '⏭️ Not requested' || needs.build-linux-arm64-manual.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS (x86_64, manual) | ${{ needs.build-macos-x86-manual.result == 'success' && '✅ Success' || needs.build-macos-x86-manual.result == 'skipped' && '⏭️ Not requested' || needs.build-macos-x86-manual.result == 'cancelled' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Any Build Failed
        if: |
          needs.build-linux.result == 'failure' ||
          needs.build-linux-generals.result == 'failure' ||
          needs.build-macos.result == 'failure' ||
          needs.build-macos-generals.result == 'failure' ||
          needs.build-windows.result == 'failure' ||
          needs.build-linux-arm64-manual.result == 'failure' ||
          needs.build-macos-x86-manual.result == 'failure'
        run: exit 1

