name: GeneralsX CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      zh-should-build: ${{ steps.filter.outputs.zh-should-build }}
      base-should-build: ${{ steps.filter.outputs.base-should-build }}
      flatpak-should-build: ${{ steps.filter.outputs.flatpak-should-build }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter Changed Paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          token: ''
          filters: |
            zh-should-build:
              - 'GeneralsMD/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'
            base-should-build:
              - 'Generals/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - '.github/workflows/build-*.yml'
              - '.github/workflows/ci.yml'
            flatpak-should-build:
              - 'flatpak/**'
              - 'GeneralsMD/**'
              - 'Generals/**'
              - 'Core/**'
              - 'Dependencies/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'scripts/build/linux/build-linux-flatpak.sh'
              - '.github/workflows/build-linux-flatpak.yml'
              - '.github/workflows/ci.yml'

      - name: Build Trigger Summary
        run: |
          echo "### 🔍 CI Trigger (Granular)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.filter.outputs.zh-should-build }}" = "true" ]; then
            echo "| GeneralsX ZH (GeneralsMD) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX ZH (GeneralsMD) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.filter.outputs.base-should-build }}" = "true" ]; then
            echo "| GeneralsX Base (Generals) | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GeneralsX Base (Generals) | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.filter.outputs.flatpak-should-build }}" = "true" ]; then
            echo "| Linux Flatpak | ✅ Changes detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux Flatpak | ⏭️ No changes |" >> $GITHUB_STEP_SUMMARY
          fi

  build-linux-gzip:
    name: Build Linux gzip
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux.yml
    with:
      preset: linux64-deploy
      package_format: gzip
    secrets: inherit

  build-linux-appimage:
    name: Build Linux AppImage
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux.yml
    with:
      preset: linux64-deploy
      package_format: appimage
    secrets: inherit

  build-macos:
    name: Build macOS
    needs: detect-changes
    if: needs.detect-changes.outputs.zh-should-build == 'true' || needs.detect-changes.outputs.base-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-macos.yml
    with:
      preset: macos-vulkan
    secrets: inherit

  build-linux-flatpak:
    name: Build Linux Flatpak
    needs: detect-changes
    if: needs.detect-changes.outputs.flatpak-should-build == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-linux-flatpak.yml
