name: Build macOS

permissions:
  contents: read
  pull-requests: read

on:
  workflow_call:
    inputs:
      game:
        required: true
        type: string
        description: "Game to build (GeneralsMD, Generals)"
      preset:
        required: false
        type: string
        default: "macos-vulkan"
        description: "CMake preset for macOS"
      runs_on:
        required: false
        type: string
        default: "macos-latest"
        description: "GitHub runner label for macOS build"
      vcpkg_triplet:
        required: false
        type: string
        default: "arm64-osx"
        description: "vcpkg triplet for macOS build"
      bundle_enabled:
        required: false
        type: string
        default: "true"
        description: "Set to false to skip .app bundling"
  workflow_dispatch:
    inputs:
      game:
        type: choice
        description: "Game to build"
        options:
          - GeneralsMD
          - Generals
        default: GeneralsMD
      preset:
        type: choice
        description: "CMake preset for macOS"
        options:
          - macos-vulkan
        default: macos-vulkan
      runs_on:
        type: choice
        description: "GitHub runner label for macOS build"
        options:
          - macos-26
          - macos-26-intel
        default: macos-26
      vcpkg_triplet:
        type: choice
        description: "vcpkg triplet for macOS build"
        options:
          - arm64-osx
          - x64-osx
        default: arm64-osx
      bundle_enabled:
        type: choice
        description: "Run bundle step (.app/.zip)"
        options:
          - "true"
          - "false"
        default: "true"

jobs:
  build:
    name: ${{ inputs.game }}@${{ inputs.preset }} (${{ inputs.runs_on }}, ${{ inputs.vcpkg_triplet }})
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache brew packages
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-macos-${{ runner.os }}-${{ hashFiles('.github/workflows/build-macos.yml') }}
          restore-keys: |
            brew-macos-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'ffc071e0c08432c60c9b64f00334c0227667931b'

      - name: Install Dependencies
        run: |
          echo "Installing macOS build dependencies..."
          
          # Update Homebrew to ensure fresh formulas
          brew update
          
          # Ensure xcode-select is properly configured (needed for clang/clang++)
          xcode-select --install 2>/dev/null || echo "xcode-select already installed"
          xcode-select -p || (echo "❌ Xcode command-line tools not installed"; exit 1)
          
          # Build tools
          brew install cmake ninja meson pkg-config

          # Autotools (required by vcpkg when building packages like gperf from source)
          brew install autoconf autoconf-archive automake libtool
          
          # FFmpeg (required by GameEngineDevice for video playback via pkg-config)
          # Note: FFmpeg brings most codec/protocol dependencies, but we explicitly list
          # discovered dylibs to ensure no optional deps are missed in bundle step
          brew install ffmpeg \
            libbluray gnutls librist srt libssh zeromq \
            libvpx webp jpeg-xl dav1d opencore-amr snappy aom libvmaf lame \
            xz aribb24 libpng
          
          # Freetype + Fontconfig (required by font rendering)
          brew install freetype fontconfig
          
          # NOTE: GLM is intentionally NOT installed via Homebrew.
          # It is fetched via CMake FetchContent in cmake/glm.cmake (tag 1.0.3).
          # Installing a system GLM causes glm::glm vs glm::glm-header-only target
          # conflicts when vcpkg's cmake wrapper calls _find_package(glm) and finds
          # both the Homebrew-installed version and the FetchContent version.

          # glslang (required by DXVK Meson build to compile GLSL shaders to SPIR-V)
          brew install glslang

          # GeneralsX @bugfix fbraz3 20/03/2026 SDL3 must be installed via Homebrew so DXVK's
          # Meson build discovers it via pkg-config and compiles the SDL3 WSI backend.
          # Without this, meson falls back to SDL2-only and DXVK_WSI_DRIVER=SDL3 fails at runtime.
          brew install sdl3

          # NOTE: OpenAL Soft is intentionally NOT installed via Homebrew.
          # It is fetched via CMake FetchContent in cmake/openal.cmake (v1.24.2).
          # Installing Homebrew openal-soft was unreliable on Apple Silicon M-series:
          # Intel Homebrew (/usr/local) installs x86_64-only binaries which fail to
          # link against native arm64 builds. FetchContent compiles for the native arch.

          # Verify all tools are available
          cmake --version | head -1
          ninja --version | head -1
          meson --version | head -1
          pkg-config --version | head -1
          clang --version | head -1
          pkg-config --modversion libavcodec 2>/dev/null && echo "FFmpeg: libavcodec available" || echo "FFmpeg: libavcodec NOT found"
          # Note: GLM cmake config check omitted intentionally — GLM comes from FetchContent, not Homebrew.

          echo "Build tools installed"

      - name: Install Vulkan SDK
        run: |
          echo "Installing Vulkan SDK (required for DXVK + MoltenVK)..."
          
          # Strategy 1: Direct download of versioned SDK with SHA256 validation (PREFERRED)
          VULKAN_ZIP="/tmp/vulkansdk-macos-1.4.341.1.zip"
          VULKAN_URL="https://sdk.lunarg.com/sdk/download/1.4.341.1/mac/vulkansdk-macos-1.4.341.1.zip"
          EXPECTED_SHA256="632cbe96c8ed6ed00c6ce25e3a7738c466134f76586e1c51f1419410d7f9042e"
          
          echo "Attempting versioned Vulkan SDK download (1.4.341.1)..."
          for attempt in 1 2 3; do
            echo "Download attempt $attempt/3..."
            rm -f "$VULKAN_ZIP"
            
            if curl -L --max-time 120 --retry 2 -o "$VULKAN_ZIP" "$VULKAN_URL" 2>&1; then
              # Validate SHA256
              ACTUAL_SHA256=$(shasum -a 256 "$VULKAN_ZIP" | awk '{print $1}')
              if [ "$ACTUAL_SHA256" = "$EXPECTED_SHA256" ]; then
                echo "✅ Valid SHA256 match: $ACTUAL_SHA256"
                break
              else
                echo "⚠️ SHA256 mismatch. Expected: $EXPECTED_SHA256, Got: $ACTUAL_SHA256"
                # Check file size to diagnose
                ZIP_SIZE=$(stat -f%z "$VULKAN_ZIP" 2>/dev/null || echo "0")
                echo "   File size: $ZIP_SIZE bytes"
                if [ "$ZIP_SIZE" -lt 10000000 ]; then
                  echo "   File appears to be HTML error (too small)"
                  head -20 "$VULKAN_ZIP"
                fi
              fi
            else
              echo "❌ Download failed"
            fi
            
            if [ $attempt -lt 3 ]; then sleep 15; fi
          done
          
          # Extract and install if valid ZIP
          if [ -f "$VULKAN_ZIP" ] && [ "$(stat -f%z "$VULKAN_ZIP" 2>/dev/null || echo 0)" -gt 100000000 ]; then
            echo "Extracting Vulkan SDK ZIP..."
            
            # Verify ZIP integrity before extraction
            echo "Validating ZIP file integrity..."
            if ! unzip -t "$VULKAN_ZIP" > /dev/null 2>&1; then
              echo "❌ ZIP file is corrupted"
              unzip -t "$VULKAN_ZIP" || true
              rm -f "$VULKAN_ZIP"
              VULKAN_SDK=""
            else
              echo "✅ ZIP file is valid"
              
              # List ZIP contents for debugging
              echo "ZIP contents:"
              unzip -l "$VULKAN_ZIP" | head -20
              
              # Extract with verbose output (not quiet)
              mkdir -p /tmp/vulkan-extract
              unzip -o "$VULKAN_ZIP" -d /tmp/vulkan-extract
              
              # List extracted contents
              echo "Extracted structure:"
              find /tmp/vulkan-extract -type f -o -type d | head -30
              
              # Strategy 1: Look for .app bundle (primary)
              VULKAN_APP=$(find /tmp/vulkan-extract -name "*.app" -type d 2>/dev/null | head -1)
              if [ -n "$VULKAN_APP" ]; then
                INSTALLER="$VULKAN_APP/Contents/MacOS/vulkansdk-macOS-1.4.341.1"
                if [ -f "$INSTALLER" ]; then
                  echo "Found .app bundle installer: $INSTALLER"
                  VULKAN_EXECUTABLE="$INSTALLER"
                else
                  echo "⚠️ .app bundle found but executable not at expected path"
                  ls -la "$VULKAN_APP/Contents/MacOS/" || true
                  VULKAN_EXECUTABLE=""
                fi
              else
                echo "⚠️ No .app bundle found"
              fi
              
              # Strategy 2: Look for direct executable if no .app found
              if [ -z "$VULKAN_EXECUTABLE" ]; then
                VULKAN_EXECUTABLE=$(find /tmp/vulkan-extract -name "vulkansdk-macOS-*" -type f -executable 2>/dev/null | head -1)
                if [ -n "$VULKAN_EXECUTABLE" ]; then
                  echo "Found direct executable: $VULKAN_EXECUTABLE"
                else
                  # Try non-executable variant
                  VULKAN_EXECUTABLE=$(find /tmp/vulkan-extract -name "vulkansdk-macOS-*" -type f 2>/dev/null | head -1)
                  if [ -n "$VULKAN_EXECUTABLE" ]; then
                    echo "Found executable (making executable): $VULKAN_EXECUTABLE"
                    chmod +x "$VULKAN_EXECUTABLE"
                  fi
                fi
              fi
              
              # Execute installer if found
              if [ -n "$VULKAN_EXECUTABLE" ] && [ -f "$VULKAN_EXECUTABLE" ]; then
                INSTALL_TARGET="$HOME/VulkanSDK/1.4.341.1"
                echo "Running Vulkan SDK installer to $INSTALL_TARGET..."
                "$VULKAN_EXECUTABLE" \
                  --root "$INSTALL_TARGET" \
                  --accept-licenses \
                  --default-answer \
                  --confirm-command install
                INSTALL_STATUS=$?
                
                if [ $INSTALL_STATUS -eq 0 ]; then
                  # Normalize to platform subdirectory (CMake FindVulkan expects VULKAN_SDK/lib, not VULKAN_SDK/macOS/lib)
                  if [ -d "$INSTALL_TARGET/macOS" ]; then
                    VULKAN_SDK="$INSTALL_TARGET/macOS"
                  else
                    VULKAN_SDK="$INSTALL_TARGET"
                  fi
                  echo "✅ Vulkan SDK installed to $INSTALL_TARGET"
                  echo "✅ Normalized VULKAN_SDK to: $VULKAN_SDK"
                else
                  echo "❌ Installer failed with status $INSTALL_STATUS"
                  VULKAN_SDK=""
                fi
              else
                echo "❌ No installer found"
                VULKAN_SDK=""
              fi
              
              rm -rf /tmp/vulkan-extract "$VULKAN_ZIP"
            fi
          else
            echo "⚠️ Vulkan SDK versioned download/validation failed; trying Homebrew fallback"
          fi
          
          # Strategy 2: Homebrew fallback (if versioned download failed)
          if [ -z "$VULKAN_SDK" ] || [ ! -d "$VULKAN_SDK" ]; then
            echo "Attempting Homebrew installation (may be older version)..."
            if brew tap LunarG/vulkan 2>/dev/null || true; then
              if brew install --cask vulkan-sdk 2>/dev/null; then
                echo "✅ Vulkan SDK installed via Homebrew (note: may be older than 1.4.341.1)"
                VULKAN_SDK="$(brew --prefix vulkan-sdk)/macOS"
                if [ ! -d "$VULKAN_SDK" ]; then
                  VULKAN_SDK="/usr/local/Caskroom/vulkan-sdk/latest/VulkanSDK"
                fi
              fi
            fi
          fi
          
          # Set environment variables for downstream steps
          if [ -z "$VULKAN_SDK" ] || [ ! -d "$VULKAN_SDK" ]; then
            # Last resort: search for any installed SDK, prefer macOS subdir
            for candidate in $(find $HOME/VulkanSDK -maxdepth 2 -type d -name "macOS" 2>/dev/null); do
              VULKAN_SDK="$candidate"
              break
            done
          fi

          # Normalize: if VULKAN_SDK points to version root (has macOS subdir), use macOS subdir
          if [ -d "$VULKAN_SDK/macOS" ] && [ -f "$VULKAN_SDK/macOS/lib/libvulkan.dylib" ]; then
            VULKAN_SDK="$VULKAN_SDK/macOS"
            echo "Normalized VULKAN_SDK to platform subdirectory"
          fi
          
          if [ -z "$VULKAN_SDK" ] || [ ! -d "$VULKAN_SDK" ]; then
            echo "⚠️ Vulkan SDK not found in standard locations; using default path (system Vulkan may be used)"
            VULKAN_SDK="$HOME/VulkanSDK"
          fi
          
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "✅ Vulkan SDK path set to: $VULKAN_SDK"
          
          # Verify MoltenVK presence
          if [ -f "$VULKAN_SDK/lib/libMoltenVK.dylib" ]; then
            echo "✅ MoltenVK found at $VULKAN_SDK/lib/libMoltenVK.dylib"
          else
            echo "⚠️ MoltenVK not found at $VULKAN_SDK/lib/libMoltenVK.dylib"
            echo "Checking for alternate locations..."
            find "$(dirname $VULKAN_SDK)" -name "libMoltenVK*" 2>/dev/null | head -5 || echo "(none found)"
          fi

      - name: Configure CMake (macOS)
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_DEFAULT_TRIPLET: ${{ inputs.vcpkg_triplet }}
          CC: clang
          CXX: clang++
        run: |
          mkdir -p logs
          echo "VULKAN_SDK=$VULKAN_SDK"
          echo "CC=$CC"
          echo "CXX=$CXX"
          cmake --preset ${{ inputs.preset }} 2>&1 | tee logs/configure_macos.log
          CONFIG_STATUS=${PIPESTATUS[0]}
          if [ $CONFIG_STATUS -eq 0 ]; then echo "✅ CMake configuration complete"; else echo "❌ CMake configuration failed"; exit 1; fi

      - name: Build ${{ inputs.game }}
        run: |
          mkdir -p logs
          NPROC=$(sysctl -n hw.ncpu)
          echo "Building with $NPROC parallel jobs..."
          
          if [ "${{ inputs.game }}" = "GeneralsMD" ]; then
            cmake --build build/${{ inputs.preset }} --target z_generals -j $NPROC 2>&1 | tee logs/build_zh_macos.log
            BUILD_STATUS=${PIPESTATUS[0]}
            LOG_FILE="logs/build_zh_macos.log"
          else
            cmake --build build/${{ inputs.preset }} --target g_generals -j $NPROC 2>&1 | tee logs/build_generals_macos.log
            BUILD_STATUS=${PIPESTATUS[0]}
            LOG_FILE="logs/build_generals_macos.log"
          fi
          
          if [ $BUILD_STATUS -eq 0 ]; then
            echo "✅ Build completed successfully"
          else
            echo "❌ Build failed; see $LOG_FILE for details"
            tail -100 "$LOG_FILE"
            exit 1
          fi

      - name: Verify Build Artifacts
        run: |
          if [ "${{ inputs.game }}" = "GeneralsMD" ]; then
            BINARY="build/${{ inputs.preset }}/GeneralsMD/GeneralsXZH"
            DISPLAY_NAME="GeneralsXZH"
            GAME_DIR="GeneralsMD"
          else
            BINARY="build/${{ inputs.preset }}/Generals/GeneralsX"
            DISPLAY_NAME="Generals"
            GAME_DIR="Generals"
          fi
          
          if [ -f "$BINARY" ]; then
            echo "✅ Binary built: $DISPLAY_NAME"
            file "$BINARY"
            ls -lh "$BINARY"
            
            # Verify it's a valid Mach-O binary
            if file "$BINARY" | grep -q "Mach-O"; then
              echo "✅ Valid Mach-O binary"
            else
              echo "❌ File exists but is not a valid Mach-O binary"
              exit 1
            fi
          else
            echo "❌ Binary NOT found: $BINARY"
            echo "Checking build directory:"
            ls -la build/${{ inputs.preset }}/GeneralsMD/ 2>/dev/null || ls -la build/${{ inputs.preset }}/Generals/ 2>/dev/null || echo "Build directories not found"
            exit 1
          fi

      - name: Bundle .app (GeneralsX macOS Distribution)
        if: success() && inputs.bundle_enabled == 'true'
        env:
          VULKAN_SDK: ${{ env.VULKAN_SDK }}
        run: |
          mkdir -p logs
          echo "Bundling ${{ inputs.game }} into macOS .app package..."
          
          if [ "${{ inputs.game }}" = "GeneralsMD" ]; then
            echo "Executing: ./scripts/build/macos/bundle-macos-zh.sh"
            ./scripts/build/macos/bundle-macos-zh.sh 2>&1 | tee logs/bundle_zh_macos.log
            BUNDLE_STATUS=${PIPESTATUS[0]}
            OUTPUT_ZIP="GeneralsXZH-macos-arm64.zip"
          else
            echo "Executing: ./scripts/build/macos/bundle-macos-generals.sh"
            ./scripts/build/macos/bundle-macos-generals.sh 2>&1 | tee logs/bundle_generals_macos.log
            BUNDLE_STATUS=${PIPESTATUS[0]}
            OUTPUT_ZIP="GeneralsX-macos-arm64.zip"
          fi
          
          if [ $BUNDLE_STATUS -eq 0 ]; then
            echo "✅ Bundle completed successfully"
            if [ -f "${OUTPUT_ZIP}" ]; then
              echo "✅ Output: ${OUTPUT_ZIP}"
              du -sh "${OUTPUT_ZIP}"
            else
              echo "❌ Output zip not found: ${OUTPUT_ZIP}"
              exit 1
            fi
          else
            echo "❌ Bundle script failed; see logs for details"
            tail -100 logs/bundle_*_macos.log || true
            exit 1
          fi

      - name: Prepare .app Artifact
        if: success() && inputs.bundle_enabled == 'true'
        run: |
          if [ "${{ inputs.game }}" = "GeneralsMD" ]; then
            OUTPUT_ZIP="GeneralsXZH-macos-arm64.zip"
            APP_NAME="GeneralsXZH.app"
          else
            OUTPUT_ZIP="GeneralsX-macos-arm64.zip"
            APP_NAME="GeneralsX.app"
          fi

          ARTIFACT_DIR="/tmp/macos-artifact-${{ inputs.game }}"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}"

          unzip -q "${OUTPUT_ZIP}" -d "${ARTIFACT_DIR}"

          if [ ! -d "${ARTIFACT_DIR}/${APP_NAME}" ]; then
            echo "❌ App bundle not found after extracting ${OUTPUT_ZIP}: ${ARTIFACT_DIR}/${APP_NAME}"
            find "${ARTIFACT_DIR}" -maxdepth 2 -print
            exit 1
          fi

          echo "✅ Prepared app bundle artifact: ${ARTIFACT_DIR}/${APP_NAME}"
          du -sh "${ARTIFACT_DIR}/${APP_NAME}"

          # GeneralsX @build fbraz3 27/03/2026 Archive .app as tar (no compression) to preserve symlinks and executable bits.
          BUNDLE_TAR="${ARTIFACT_DIR}/${APP_NAME%.app}.tar"
          tar -C "${ARTIFACT_DIR}" -cf "${BUNDLE_TAR}" "${APP_NAME}"
          echo "✅ Archive ready: ${BUNDLE_TAR}"

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos-${{ inputs.game }}-${{ runner.arch }}-${{ inputs.vcpkg_triplet }}
          path: logs/
          retention-days: 7

      - name: Upload Bundle
        if: success() && inputs.bundle_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('{0}-{1}-{2}', inputs.game == 'GeneralsMD' && 'macos-generalsxzh-app' || 'macos-generalsx-app', runner.arch, inputs.vcpkg_triplet) }}
          path: /tmp/macos-artifact-${{ inputs.game }}/*.tar
          retention-days: 7
          if-no-files-found: warn
