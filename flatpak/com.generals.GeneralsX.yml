app-id: com.generals.GeneralsX
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: generalsx-wrapper.sh

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=~/GeneralsX:create
  - --filesystem=xdg-data/GeneralsX:create

modules:
  - name: generalsx-runtime
    buildsystem: simple
    build-commands:
      - install -Dm755 GeneralsX /app/bin/GeneralsX
      - install -Dm755 run-flatpak-generals.sh /app/bin/generalsx-wrapper.sh
      - install -Dm644 com.generals.GeneralsX.desktop /app/share/applications/com.generals.GeneralsX.desktop
      - install -Dm644 com.generals.GeneralsX.metainfo.xml /app/share/metainfo/com.generals.GeneralsX.metainfo.xml
      - install -Dm644 generalsx_icon_512.png /app/share/icons/hicolor/512x512/apps/com.generals.GeneralsX.png
      - install -Dm644 dxvk.conf /app/share/generalsx/dxvk.conf
      - cp -a runtime/. /app/lib/
      - |
        for f in /app/lib/lib*.so.*; do
          b="$(basename "$f")"
          if [[ "$b" =~ ^(lib[^.]+\.so)\.([0-9]+)(\..*)?$ ]]; then
            if [[ -n "${BASH_REMATCH[3]}" ]]; then
              ln -sf "$b" "/app/lib/${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            fi
          fi
        done
    sources:
      - type: file
        path: staging/GeneralsX
      - type: file
        path: run-flatpak-generals.sh
      - type: file
        path: generalsx_icon_512.png
      - type: file
        path: com.generals.GeneralsX.desktop
      - type: file
        path: com.generals.GeneralsX.metainfo.xml
      - type: file
        path: staging/dxvk.conf
      - type: dir
        path: staging/runtime
        dest: runtime
