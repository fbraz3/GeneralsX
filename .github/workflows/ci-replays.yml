name: CI Replays

on:
  workflow_run:
    workflows: ["GeneralsX CI"]
    types:
      - completed

permissions:
  contents: read
  statuses: write
  actions: read

jobs:
  check-artifacts:
    name: Check Triggering Run Artifacts
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.fork == true
    outputs:
      has-artifacts: ${{ steps.check.outputs.has-artifacts }}
    steps:
      - name: Check Artifacts
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          # Query GitHub API for artifacts in the triggering run
          ARTIFACTS=$(gh api /repos/$REPO/actions/runs/$RUN_ID/artifacts --jq '.artifacts[].name' 2>/dev/null || true)
          echo "Found artifacts:"
          echo "$ARTIFACTS"
          
          if echo "$ARTIFACTS" | grep -q "linux-flatpak-generalsxzh"; then
            echo "has-artifacts=true" >> $GITHUB_OUTPUT
            echo "Artifacts found. Replay tests will run."
          else
            echo "has-artifacts=false" >> $GITHUB_OUTPUT
            echo "No game build artifacts found. Replay tests will be skipped."
          fi

  replay-test-linux:
    name: Replay Tests (linux)
    needs: check-artifacts
    if: ${{ github.event.workflow_run.conclusion == 'success' && needs.check-artifacts.outputs.has-artifacts == 'true' }}
    uses: ./.github/workflows/replay-tests.yml
    with:
      platform: linux-flatpak
      game-artifact: linux-flatpak-generalsxzh-linux64-deploy
      run-id: ${{ github.event.workflow_run.id }}
    secrets:
      ASSETS_KEY: ${{ secrets.ASSETS_KEY }}

  replay-test-macos:
    name: Replay Tests (macos)
    needs: check-artifacts
    if: ${{ github.event.workflow_run.conclusion == 'success' && needs.check-artifacts.outputs.has-artifacts == 'true' }}
    uses: ./.github/workflows/replay-tests.yml
    with:
      platform: macos
      game-artifact: macos-generalsxzh-app
      run-id: ${{ github.event.workflow_run.id }}
    secrets:
      ASSETS_KEY: ${{ secrets.ASSETS_KEY }}

  update-pr-status:
    name: Update PR Status
    runs-on: ubuntu-latest
    needs: [check-artifacts, replay-test-linux, replay-test-macos]
    if: |
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.fork == true
    steps:
      - name: Report Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ needs.check-artifacts.outputs.has-artifacts }}" != "true" ]; then
            STATE="success"
            DESC="Replay tests skipped (no builds)"
          elif [ "${{ needs.replay-test-linux.result }}" == "success" ] && [ "${{ needs.replay-test-macos.result }}" == "success" ]; then
            STATE="success"
            DESC="Replay tests passed"
          else
            STATE="failure"
            DESC="Replay tests failed"
          fi
          
          # Report the final status back to the original commit.
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/$REPO/statuses/$SHA \
            -f state=$STATE \
            -f target_url="https://github.com/$REPO/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="CI / Replay Tests"
