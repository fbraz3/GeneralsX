name: Build Windows

permissions:
  contents: read
  pull-requests: read

on:
  workflow_call:
    inputs:
      preset:
        required: false
        type: string
        default: "windows64-deploy"
        description: "CMake preset for Windows"
  workflow_dispatch:
    inputs:
      preset:
        type: choice
        description: "CMake preset for Windows"
        options:
          - windows64-deploy
        default: windows64-deploy

jobs:
  build-windows:
    name: ${{ matrix.game.id }}@${{ inputs.preset }}
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        game:
          - id: generalsxzh
            target: z_generals
            build_script: ./scripts/build/windows/build-windows-zh.ps1
            deploy_script: ./scripts/build/windows/deploy-windows-zh.ps1
            bundle_dir: build/bundles/windows-generalsxzh-windows64-deploy
            log_suffix: zh
          - id: generalsx
            target: g_generals
            build_script: ./scripts/build/windows/build-windows-generals.ps1
            deploy_script: ./scripts/build/windows/deploy-windows-generals.ps1
            bundle_dir: build/bundles/windows-generalsx-windows64-deploy
            log_suffix: generals

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup MSYS2 MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # GeneralsX @bugfix GitHub Copilot 26/05/2026 Ensure widl can import oaidl.idl by explicitly installing MinGW headers in CI.
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-headers
            mingw-w64-ucrt-x86_64-headers
            mingw-w64-clang-x86_64-headers
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cmake

      - name: Validate MinGW IDL Headers
        shell: pwsh
        run: |
          # GeneralsX @bugfix GitHub Copilot 26/05/2026 Validate oaidl.idl using dynamic widl-derived roots plus common MSYS2 layouts.
          $roots = New-Object System.Collections.Generic.List[string]

          $widlCmd = Get-Command widl -ErrorAction SilentlyContinue
          if ($widlCmd) {
            $widlBinDir = Split-Path $widlCmd.Source -Parent
            $widlPrefix = Split-Path $widlBinDir -Parent
            $roots.Add($widlPrefix)
            Write-Host "widl path: $($widlCmd.Source)"
            Write-Host "Derived widl prefix: $widlPrefix"
          }

          @(
            'C:/msys64/mingw64',
            'C:/msys64/ucrt64',
            'C:/msys64/clang64',
            'C:/mingw64'
          ) | ForEach-Object { $roots.Add($_) }

          $roots = $roots | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $idlCandidates = foreach ($root in $roots) {
            @(
              "$root/include/oaidl.idl",
              "$root/include/wine/windows/oaidl.idl",
              "$root/share/widl/include/oaidl.idl"
            )
          }

          $foundPath = $null
          foreach ($idl in $idlCandidates) {
            if (Test-Path $idl) {
              $foundPath = $idl
              break
            }
          }

          if (-not $foundPath) {
            foreach ($probeRoot in @('C:/msys64', 'C:/mingw64')) {
              if (-not (Test-Path $probeRoot)) {
                continue
              }

              $probe = Get-ChildItem -Path $probeRoot -Filter oaidl.idl -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($probe) {
                $foundPath = $probe.FullName
                break
              }
            }
          }

          if ($foundPath) {
            Write-Host "Found IDL header: $foundPath"
          } else {
            Write-Error 'oaidl.idl not found in expected MSYS2/MinGW include directories.'
            exit 1
          }

      - name: Configure CMake (${{ inputs.preset }})
        shell: pwsh
        run: |
          ./scripts/build/windows/configure-windows64.ps1

      - name: Build ${{ matrix.game.target }}
        shell: pwsh
        run: |
          & "${{ matrix.game.build_script }}"

      - name: Generate Windows Bundle
        shell: pwsh
        run: |
          & "${{ matrix.game.deploy_script }}"

      - name: Verify Bundle Output
        shell: pwsh
        run: |
          if (-not (Test-Path "${{ matrix.game.bundle_dir }}")) {
            Write-Error "Bundle directory not found: ${{ matrix.game.bundle_dir }}"
            exit 1
          }
          Get-ChildItem -Path "${{ matrix.game.bundle_dir }}" -Force | Format-Table Name, Length

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-windows-${{ matrix.game.id }}-${{ inputs.preset }}
          path: logs/
          retention-days: 7

      - name: Upload Windows Bundle
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: windows-bundle-${{ matrix.game.id }}-${{ inputs.preset }}
          path: ${{ matrix.game.bundle_dir }}
          retention-days: 7
          if-no-files-found: error
