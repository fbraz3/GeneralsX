# GeneralsX DXVK configuration
# Deployed to the game directory by scripts/deploy_zh_modern.ps1
# Reference: https://github.com/doitsujin/dxvk/blob/master/dxvk.conf

# Disable OpenXR extension provider.
# Without this, DXVK hangs indefinitely during vkCreateInstance on systems that
# have an OpenXR runtime installed (SteamVR, WMR, Oculus) but not currently
# running. The hang manifests as a ~63MB process with no window and no output.
# GeneralsX does not use VR, so there is no reason to enumerate OpenXR.
# GeneralsX @bugfix felipebraz 03/03/2026 Disable OpenXR to prevent DXVK hang on init
dxvk.enableOpenXR = False

# Log level: none, error, warn, info, debug
# Set to 'info' to diagnose device enumeration hangs; revert to 'warn' for normal use.
dxvk.logLevel = info
