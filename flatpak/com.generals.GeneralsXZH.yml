app-id: com.generals.GeneralsXZH
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: generalsxzh-wrapper.sh

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=~/GeneralsX:create
  - --filesystem=xdg-data/GeneralsX:create

modules:
  - name: generalsxzh-runtime
    buildsystem: simple
    build-commands:
      - install -Dm755 GeneralsXZH /app/bin/GeneralsXZH
      - install -Dm755 run-flatpak.sh /app/bin/generalsxzh-wrapper.sh
      - install -Dm644 com.generals.GeneralsXZH.desktop /app/share/applications/com.generals.GeneralsXZH.desktop
      - install -Dm644 com.generals.GeneralsXZH.metainfo.xml /app/share/metainfo/com.generals.GeneralsXZH.metainfo.xml
      - install -Dm644 generalsx-zh_icon_512.png /app/share/icons/hicolor/512x512/apps/com.generals.GeneralsXZH.png
      - install -Dm644 dxvk.conf /app/share/generalsxzh/dxvk.conf
      - cp -a runtime/. /app/lib/
      - |
        for f in /app/lib/lib*.so.*; do
          b="$(basename "$f")"
          if [[ "$b" =~ ^(lib[^.]+\.so)\.([0-9]+)(\..*)?$ ]]; then
            if [[ -n "${BASH_REMATCH[3]}" ]]; then
              ln -sf "$b" "/app/lib/${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            fi
          fi
        done
    sources:
      - type: file
        path: staging/GeneralsXZH
      - type: file
        path: run-flatpak.sh
      - type: file
        path: generalsx-zh_icon_512.png
      - type: file
        path: com.generals.GeneralsXZH.desktop
      - type: file
        path: com.generals.GeneralsXZH.metainfo.xml
      - type: file
        path: staging/dxvk.conf
      - type: dir
        path: staging/runtime
        dest: runtime
