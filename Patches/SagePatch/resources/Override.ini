; -----------------------------------------------------------------------------
; SagePatch — Casual QoL overrides for GeneralsX
;
; Extends camera bounds, scroll speed, and pitch range to values closer to what
; players typically want for casual play. Loaded by the engine after the
; default GameData.ini, so values here override (don't add to) the originals.
;
; Vanilla values (from GeneralsMD/Code/GameEngine/Source/Common/GlobalData.cpp):
;   MaxCameraHeight = 300, MinCameraHeight = 100, KeyboardScrollSpeedFactor = 0.5
;
; To disable the override, simply remove this file from the game directory or
; build with -DRTS_BUILD_OPTION_SAGE_PATCH=OFF.
; -----------------------------------------------------------------------------

GameData
  ; Camera zoom range — much wider than vanilla so casual players can survey
  ; entire bases or look up close at units.
  MaxCameraHeight = 800.0
  MinCameraHeight = 60.0
  EnforceMaxCameraHeight = No

  ; Keyboard scroll speed — vanilla was sluggish. Doubled.
  KeyboardScrollSpeedFactor = 1.0
End
