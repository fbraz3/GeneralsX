name: Build Linux ARM64 (Manual)

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      game:
        type: choice
        description: "Game to build"
        options:
          - GeneralsMD
          - Generals
        default: GeneralsMD
      preset:
        type: choice
        description: "CMake preset for Linux"
        options:
          - linux64-deploy
          - linux64-testing
        default: linux64-deploy

jobs:
  build-linux-arm64:
    name: Linux ARM64 / ${{ inputs.game }}@${{ inputs.preset }}
    uses: ./.github/workflows/build-linux.yml
    with:
      game: ${{ inputs.game }}
      preset: ${{ inputs.preset }}
      # GeneralsX @build Copilot 28/03/2026 Dedicated ARM64 runner for manual CI bring-up.
      runs_on: ubuntu-24.04-arm
    secrets: inherit
