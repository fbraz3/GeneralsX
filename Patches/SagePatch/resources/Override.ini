; -----------------------------------------------------------------------------
; SagePatch — Casual QoL overrides for GeneralsX
;
; Extends camera bounds, pitch range, and scroll speed to values closer to
; what casual players want. Loaded by the engine after the default
; GameData.ini, so values here override (don't add to) the originals.
;
; Vanilla values (from GeneralsMD/Code/GameEngine/Source/Common/GlobalData.cpp):
;   MaxCameraHeight = 300, MinCameraHeight = 100
;   CameraPitch = ~63
;   KeyboardScrollSpeedFactor = 0.5
;
; To disable the override: remove this file from the game directory or build
; with -DRTS_BUILD_OPTION_SAGE_PATCH=OFF.
; -----------------------------------------------------------------------------

GameData
  ; Camera zoom range — much wider than vanilla so casual players can survey
  ; entire bases or look up close at units.
  MaxCameraHeight = 800.0
  MinCameraHeight = 60.0
  EnforceMaxCameraHeight = No

  ; Camera pitch — vanilla pins around 63. We let players go more top-down or
  ; flatter without breaking terrain rendering.
  CameraPitch = 50.0

  ; Keyboard scroll speed — vanilla was sluggish. Doubled.
  KeyboardScrollSpeedFactor = 1.0
End
