name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version tag (e.g., GeneralsX-Beta-3)"
        required: true
        type: string
      additional_notes:
        description: "Additional notes (optional markdown)"
        required: false
        type: string
      create_release:
        description: "Create new release"
        required: false
        type: boolean
        default: false
      is_prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run: never create tag/release, only generate notes + artifacts"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.release_version }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build-linux-zh:
    uses: ./.github/workflows/build-linux.yml
    with:
      game: GeneralsMD
      preset: linux64-deploy

  build-linux-generals:
    uses: ./.github/workflows/build-linux.yml
    with:
      game: Generals
      preset: linux64-deploy

  build-macos-zh:
    uses: ./.github/workflows/build-macos.yml
    with:
      game: GeneralsMD
      preset: macos-vulkan

  build-macos-generals:
    uses: ./.github/workflows/build-macos.yml
    with:
      game: Generals
      preset: macos-vulkan

  build-windows-zh:
    uses: ./.github/workflows/build-windows.yml
    if: true == false # Temporarily disable Windows build until it's implemented
    with:
      game: GeneralsMD
      preset: win64-modern

  prepare-release:
    runs-on: ubuntu-latest
    needs: [build-linux-zh, build-linux-generals, build-macos-zh, build-macos-generals]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate release inputs
        run: |
          VERSION="${{ inputs.release_version }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ -z "$VERSION" ]; then
            echo "ERROR: release_version is required"
            exit 1
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled. Tag/release creation will be skipped."
          else
            if git show-ref --tags --verify --quiet "refs/tags/$VERSION"; then
              echo "ERROR: Tag $VERSION already exists"
              exit 1
            fi
          fi

      - name: Detect latest release tag
        id: latest
        run: |
          LATEST_TAG=$(git tag -l "GeneralsX*" --sort=-version:refname --merged HEAD | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
            echo "latest_tag_date=" >> "$GITHUB_OUTPUT"
            echo "first_release=true" >> "$GITHUB_OUTPUT"
          else
            LATEST_TAG_DATE=$(git log -1 --format=%cI "$LATEST_TAG")
            echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "latest_tag_date=$LATEST_TAG_DATE" >> "$GITHUB_OUTPUT"
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-generalsxzh-linux64-bundle
          path: artifacts/linux

      - name: Download Linux Generals bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-generalsx-linux64-bundle
          path: artifacts/linux-generals

      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-generalsxzh-app
          path: artifacts/macos

      - name: Download macOS Generals bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-generalsx-app
          path: artifacts/macos-generals

      - name: Normalize bundle files for release assets
        id: assets
        run: |
          mkdir -p release-assets

          LINUX_TAR=$(find artifacts/linux -name "*.tar" | head -1)
          if [ -z "$LINUX_TAR" ] || [ ! -f "$LINUX_TAR" ]; then
            echo "ERROR: Linux bundle tar not found in artifacts/linux"
            find artifacts/linux -maxdepth 3 -type f || true
            exit 1
          fi

          mkdir -p /tmp/linux-bundle
          tar -xf "$LINUX_TAR" -C /tmp/linux-bundle
          (
            cd /tmp/linux-bundle
            zip -r "$GITHUB_WORKSPACE/release-assets/linux-generalsxzh-linux64-bundle.zip" .
          )

          LINUX_GENERALS_TAR=$(find artifacts/linux-generals -name "*.tar" | head -1)
          if [ -z "$LINUX_GENERALS_TAR" ] || [ ! -f "$LINUX_GENERALS_TAR" ]; then
            echo "ERROR: Linux Generals bundle tar not found in artifacts/linux-generals"
            find artifacts/linux-generals -maxdepth 3 -type f || true
            exit 1
          fi

          mkdir -p /tmp/linux-generals-bundle
          tar -xf "$LINUX_GENERALS_TAR" -C /tmp/linux-generals-bundle
          (
            cd /tmp/linux-generals-bundle
            zip -r "$GITHUB_WORKSPACE/release-assets/linux-generalsx-linux64-bundle.zip" .
          )

          MAC_TAR=$(find artifacts/macos -name "*.tar" | head -1)
          if [ -z "$MAC_TAR" ] || [ ! -f "$MAC_TAR" ]; then
            echo "ERROR: macOS app tar not found in artifacts/macos"
            find artifacts/macos -maxdepth 3 -type f || true
            exit 1
          fi

          cp "$MAC_TAR" release-assets/GeneralsXZH-macos-arm64.app.tar
          zip -j release-assets/macos-generalsxzh-app.tar.zip release-assets/GeneralsXZH-macos-arm64.app.tar

          MAC_GENERALS_TAR=$(find artifacts/macos-generals -name "*.tar" | head -1)
          if [ -z "$MAC_GENERALS_TAR" ] || [ ! -f "$MAC_GENERALS_TAR" ]; then
            echo "ERROR: macOS Generals app tar not found in artifacts/macos-generals"
            find artifacts/macos-generals -maxdepth 3 -type f || true
            exit 1
          fi

          cp "$MAC_GENERALS_TAR" release-assets/GeneralsX-macos-arm64.app.tar
          zip -j release-assets/macos-generalsx-app.tar.zip release-assets/GeneralsX-macos-arm64.app.tar

          echo "linux_generals_asset=$GITHUB_WORKSPACE/release-assets/linux-generalsx-linux64-bundle.zip" >> "$GITHUB_OUTPUT"
          echo "linux_asset=$GITHUB_WORKSPACE/release-assets/linux-generalsxzh-linux64-bundle.zip" >> "$GITHUB_OUTPUT"
          echo "macos_generals_asset=$GITHUB_WORKSPACE/release-assets/macos-generalsx-app.tar.zip" >> "$GITHUB_OUTPUT"
          echo "macos_asset=$GITHUB_WORKSPACE/release-assets/macos-generalsxzh-app.tar.zip" >> "$GITHUB_OUTPUT"

      - name: Build changelog from local PRs only
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ steps.latest.outputs.latest_tag }}
          REPO: ${{ github.repository }}
        run: |
          PR_LINES_FILE=$(mktemp)
          PR_DATA_FILE=$(mktemp)
          COMMIT_RANGE="HEAD"

          if [ -n "$LATEST_TAG" ]; then
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
          fi

          for SHA in $(git rev-list "$COMMIT_RANGE"); do
            PR_JSON=$(gh api "repos/${REPO}/commits/${SHA}/pulls" 2>/dev/null || echo "[]")
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')

            if [ -z "$PR_NUMBER" ]; then
              continue
            fi

            PR_ENTRY=$(echo "$PR_JSON" | jq -r '.[0] | "\(.number)|\(.title)|\(.user.login)|\(.html_url)"')
            echo "$PR_ENTRY" >> "$PR_DATA_FILE"
          done

          if [ -s "$PR_DATA_FILE" ]; then
            sort -u -t'|' -k1,1n "$PR_DATA_FILE" | while IFS='|' read -r NUMBER TITLE AUTHOR URL; do
              [ -z "$NUMBER" ] && continue
              echo "- ${TITLE} by @${AUTHOR} in ${URL}" >> "$PR_LINES_FILE"
            done
          fi

          if [ ! -s "$PR_LINES_FILE" ]; then
            echo "- No pull requests found in this release range." >> "$PR_LINES_FILE"
          fi

          echo "pr_lines_file=$PR_LINES_FILE" >> "$GITHUB_OUTPUT"
          echo "pr_data_file=$PR_DATA_FILE" >> "$GITHUB_OUTPUT"

      - name: Detect new contributors from PR authors
        id: new_contributors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          LATEST_TAG_DATE: ${{ steps.latest.outputs.latest_tag_date }}
        run: |
          CONTRIBUTORS_FILE=$(mktemp)
          PR_DATA_FILE="${{ steps.changelog.outputs.pr_data_file }}"

          if [ ! -s "$PR_DATA_FILE" ]; then
            echo "contributors_file=$CONTRIBUTORS_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk -F'|' '{print $3"|"$4}' "$PR_DATA_FILE" | sort -u | while IFS='|' read -r AUTHOR LOGIN_PR_URL; do
            [ -z "$AUTHOR" ] && continue

            if [ -z "$LATEST_TAG_DATE" ]; then
              echo "* @${AUTHOR} made their first contribution in ${LOGIN_PR_URL}" >> "$CONTRIBUTORS_FILE"
              continue
            fi

            PREV_COUNT=$(gh api "search/issues" \
              -f q="repo:${REPO} is:pr is:merged author:${AUTHOR} merged:<${LATEST_TAG_DATE}" \
              --jq '.total_count' 2>/dev/null || echo "0")

            if [ "$PREV_COUNT" = "0" ]; then
              echo "* @${AUTHOR} made their first contribution in ${LOGIN_PR_URL}" >> "$CONTRIBUTORS_FILE"
            fi
          done

          echo "contributors_file=$CONTRIBUTORS_FILE" >> "$GITHUB_OUTPUT"

      - name: Build release notes markdown
        id: notes
        env:
          ADDITIONAL_NOTES: ${{ inputs.additional_notes }}
          LATEST_TAG: ${{ steps.latest.outputs.latest_tag }}
          CURRENT_TAG: ${{ inputs.release_version }}
          PR_LINES_FILE: ${{ steps.changelog.outputs.pr_lines_file }}
          CONTRIBUTORS_FILE: ${{ steps.new_contributors.outputs.contributors_file }}
        run: |
          NOTES_FILE="release-assets/${{ inputs.release_version }}-notes.md"
          mkdir -p release-assets

          {
            echo "> This is a **beta** release. Some bugs are still expected. If you run into any problems, please [open an issue](https://github.com/fbraz3/GeneralsX/issues) so we can investigate."
            echo ""
            echo "# Install Instructions"
            echo ""
            echo "https://github.com/fbraz3/GeneralsX/blob/main/docs/BUILD/INSTALL_INSTRUCTIONS.md"
            echo ""

            if [ -n "$ADDITIONAL_NOTES" ]; then
              echo "## Additional Notes"
              echo ""
              echo "$ADDITIONAL_NOTES"
              echo ""
            fi

            echo "## What's Changed"
            echo ""
            cat "$PR_LINES_FILE"
            echo ""

            if [ -s "$CONTRIBUTORS_FILE" ]; then
              echo "## New Contributors"
              echo ""
              cat "$CONTRIBUTORS_FILE"
              echo ""
            fi

            if [ -n "$LATEST_TAG" ]; then
              echo "**Full Changelog**: https://github.com/fbraz3/GeneralsX/compare/${LATEST_TAG}...${CURRENT_TAG}"
            fi
          } > "$NOTES_FILE"

          echo "notes_file=$GITHUB_WORKSPACE/$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload preview artifacts
        if: success() && (inputs.dry_run == true || inputs.create_release == false)
        uses: actions/upload-artifact@v4
        with:
          name: release-preview-${{ inputs.release_version }}
          path: |
            release-assets/*.md
            release-assets/*.zip
          retention-days: 30

      - name: Create GitHub release and upload assets
        if: success() && inputs.dry_run == false && inputs.create_release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""

          if [ "${{ inputs.is_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ inputs.release_version }}" \
            $PRERELEASE_FLAG \
            --title "GeneralsX - ${{ inputs.release_version }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            "${{ steps.assets.outputs.linux_generals_asset }}" \
            "${{ steps.assets.outputs.linux_asset }}" \
            "${{ steps.assets.outputs.macos_generals_asset }}" \
            "${{ steps.assets.outputs.macos_asset }}"

      - name: Summary
        run: |
          echo "## Release Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ inputs.release_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Create release: ${{ inputs.create_release }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pre-release: ${{ inputs.is_prerelease }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Linux asset (Generals): linux-generalsx-linux64-bundle.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "- Linux asset: linux-generalsxzh-linux64-bundle.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "- macOS asset (Generals): macos-generalsx-app.tar.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "- macOS asset: macos-generalsxzh-app.tar.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ inputs.create_release }}" = "false" ]; then
            echo "No GitHub release was created. Download preview artifacts from this run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Release created and assets attached." >> "$GITHUB_STEP_SUMMARY"
          fi
